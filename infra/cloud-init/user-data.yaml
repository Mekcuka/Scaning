#cloud-config
users:
  - default
  - name: ${vm_user}
    shell: /bin/bash
    groups: [sudo, docker]
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]

package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - docker.io
  - docker-compose-v2

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ${vm_user}
  - mkdir -p /opt/decision-matrix
  - chown -R ${vm_user}:${vm_user} /opt/decision-matrix
  - mkdir -p /opt/decision-matrix/releases
  - mkdir -p /opt/decision-matrix/shared
  - chown -R ${vm_user}:${vm_user} /opt/decision-matrix/releases /opt/decision-matrix/shared
  - |
      cat > /etc/systemd/system/decision-matrix.service <<'EOF'
      [Unit]
      Description=Decision Matrix backend stack
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/decision-matrix/current
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=0

      [Install]
      WantedBy=multi-user.target
      EOF
  - systemctl daemon-reload
  - systemctl enable decision-matrix.service
