services:
  db:
    image: postgis/postgis:16-3.4
    container_name: decision-matrix-db
    restart: unless-stopped
    env_file:
      - /opt/decision-matrix/shared/db.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: decision-matrix-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ${IMAGE_REF}
    container_name: decision-matrix-api
    restart: unless-stopped
    env_file:
      - /opt/decision-matrix/shared/app.env
    volumes:
      - /opt/decision-matrix/shared/map3d_models:/app/data/map3d_models
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.9
    container_name: decision-matrix-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - /opt/decision-matrix/current/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    image: ${IMAGE_REF}
    container_name: decision-matrix-worker
    restart: unless-stopped
    env_file:
      - /opt/decision-matrix/shared/app.env
    volumes:
      - /opt/decision-matrix/shared/map3d_models:/app/data/map3d_models
    command: ["arq", "app.worker.settings.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
