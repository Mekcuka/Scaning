name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,steinerpy]"

      - name: Run tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t network-planner:ci .

      - name: Smoke test container
        run: |
          docker run -d --name network-planner-ci -p 18080:8080 network-planner:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/health; then
              echo "health ok"
              curl -sf http://localhost:18080/ready
              echo "ready ok"
              docker stop network-planner-ci
              exit 0
            fi
            sleep 2
          done
          docker logs network-planner-ci
          docker stop network-planner-ci
          exit 1
