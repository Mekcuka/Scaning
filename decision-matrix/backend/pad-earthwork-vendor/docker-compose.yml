services:
  pad-earthwork-planner:
    build: .
    ports:
      - "${APP_PORT:-8081}:8081"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
