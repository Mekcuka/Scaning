name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decision-matrix/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: decision-matrix/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Coverage (pages + lib thresholds)
        run: npm run test:coverage

      - name: Build
        env:
          VITE_BASE_PATH: /
          VITE_API_URL: http://127.0.0.1:8000
          VITE_MAP_3D_ENABLED: "false"
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decision-matrix/backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sppr
          POSTGRES_PASSWORD: sppr_secret
          POSTGRES_DB: sppr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sppr -d sppr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://sppr:sppr_secret@localhost:5432/sppr
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEMO_USERS_ENABLED: "false"
      ENVIRONMENT: test
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            decision-matrix/backend/requirements.txt
            decision-matrix/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Bootstrap PostgreSQL schema
        run: python scripts/bootstrap_schema.py

      - name: Stamp Alembic head (ORM bootstrap matches current revision)
        run: python -m alembic stamp head

      - name: Pytest
        run: pytest tests/ -q

      - name: Coverage (informational)
        run: pytest tests/ --cov=app/services --cov-report=term-missing --cov-fail-under=25

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: decision-matrix/frontend
    env:
      CI: "true"
      VITE_API_URL: http://127.0.0.1:8000
      VITE_MAP_3D_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: decision-matrix/frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: decision-matrix/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Start API
        working-directory: decision-matrix/backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/e2e.db
          SECRET_KEY: e2e-test-secret
          DEMO_USERS_ENABLED: "false"
          ENVIRONMENT: test
        run: |
          mkdir -p data
          python scripts/bootstrap_schema.py
          python -m alembic stamp head
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3

      - name: Build and preview frontend
        run: |
          npm run build
          npx vite preview --host 127.0.0.1 --port 5173 &
          sleep 2

      - name: Install Playwright
        run: npx playwright install chromium

      - name: E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: npm run test:e2e

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init & validate
        run: |
          terraform init -backend=false
          terraform validate

  security-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: decision-matrix/frontend/package-lock.json

      - name: npm audit
        working-directory: decision-matrix/frontend
        run: |
          npm ci
          npm audit --audit-level=high || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit
        run: |
          python -m pip install pip-audit
          pip-audit -r decision-matrix/backend/requirements.txt || true
