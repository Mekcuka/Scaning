name: Deploy backend to Yandex Cloud VM

on:
  push:
    branches: [main, master]
    paths:
      - "decision-matrix/backend/**"
      - "deploy/**"
      - ".github/workflows/deploy-yandex-vm.yml"
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: "Run terraform apply before deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  IMAGE_NAME: decision-matrix-backend
  TF_WORKDIR: infra/terraform

jobs:
  terraform_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write YC service account key
        run: |
          mkdir -p "$RUNNER_TEMP/yc"
          printf '%s' '${{ secrets.YC_SA_KEY_JSON }}' > "$RUNNER_TEMP/yc/key.json"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform init

      - name: Generate terraform vars
        working-directory: ${{ env.TF_WORKDIR }}
        run: |
          cat > ci-prod.auto.tfvars <<'EOF'
          environment             = "prod"
          cloud_id                = "${{ secrets.YC_CLOUD_ID }}"
          folder_id               = "${{ secrets.YC_FOLDER_ID }}"
          zone                    = "${{ vars.YC_ZONE || 'ru-central1-a' }}"
          vpc_cidr                = "${{ vars.YC_VPC_CIDR || '10.20.0.0/24' }}"
          vm_name                 = "${{ vars.YC_VM_NAME || 'decision-matrix-prod' }}"
          vm_cores                = ${{ vars.YC_VM_CORES || 4 }}
          vm_memory_gb            = ${{ vars.YC_VM_MEMORY_GB || 8 }}
          vm_disk_gb              = ${{ vars.YC_VM_DISK_GB || 50 }}
          vm_user                 = "${{ secrets.VM_USER }}"
          ssh_public_key          = "${{ secrets.VM_SSH_PUBLIC_KEY }}"
          enable_managed_postgres = ${{ vars.ENABLE_MANAGED_POSTGRES || 'false' }}
          postgres_db_name        = "${{ vars.POSTGRES_DB_NAME || 'sppr' }}"
          postgres_username       = "${{ vars.POSTGRES_USERNAME || 'sppr' }}"
          postgres_password       = "${{ secrets.POSTGRES_PASSWORD }}"
          EOF

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKDIR }}
        run: |
          terraform plan \
            -var="sa_key_file=$RUNNER_TEMP/yc/key.json" \
            -out="tfplan"

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform_plan
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_apply == 'true'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write YC service account key
        run: |
          mkdir -p "$RUNNER_TEMP/yc"
          printf '%s' '${{ secrets.YC_SA_KEY_JSON }}' > "$RUNNER_TEMP/yc/key.json"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform init

      - name: Generate terraform vars
        working-directory: ${{ env.TF_WORKDIR }}
        run: |
          cat > ci-prod.auto.tfvars <<'EOF'
          environment             = "prod"
          cloud_id                = "${{ secrets.YC_CLOUD_ID }}"
          folder_id               = "${{ secrets.YC_FOLDER_ID }}"
          zone                    = "${{ vars.YC_ZONE || 'ru-central1-a' }}"
          vpc_cidr                = "${{ vars.YC_VPC_CIDR || '10.20.0.0/24' }}"
          vm_name                 = "${{ vars.YC_VM_NAME || 'decision-matrix-prod' }}"
          vm_cores                = ${{ vars.YC_VM_CORES || 4 }}
          vm_memory_gb            = ${{ vars.YC_VM_MEMORY_GB || 8 }}
          vm_disk_gb              = ${{ vars.YC_VM_DISK_GB || 50 }}
          vm_user                 = "${{ secrets.VM_USER }}"
          ssh_public_key          = "${{ secrets.VM_SSH_PUBLIC_KEY }}"
          enable_managed_postgres = ${{ vars.ENABLE_MANAGED_POSTGRES || 'false' }}
          postgres_db_name        = "${{ vars.POSTGRES_DB_NAME || 'sppr' }}"
          postgres_username       = "${{ vars.POSTGRES_USERNAME || 'sppr' }}"
          postgres_password       = "${{ secrets.POSTGRES_PASSWORD }}"
          EOF

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKDIR }}
        run: |
          terraform apply -auto-approve \
            -var="sa_key_file=$RUNNER_TEMP/yc/key.json"

  deploy_backend:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    needs: terraform_plan
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in YC_REGISTRY_ID VM_HOST VM_USER VM_SSH_KEY APP_DOMAIN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::GitHub secret $name is empty (check environment prod)."
              exit 1
            fi
          done
          if [[ ! "$YC_REGISTRY_ID" =~ ^crp[a-z0-9]+$ ]]; then
            echo "::error::YC_REGISTRY_ID must be Container Registry id (crp...), not folder id (b1g...). Console: Container Registry -> copy ID."
            exit 1
          fi
        env:
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY_JSON }}

      - name: Resolve image reference
        id: image
        shell: bash
        env:
          REGISTRY_RAW: ${{ secrets.YC_REGISTRY_ID }}
        run: |
          set -euo pipefail
          REGISTRY_ID="${REGISTRY_RAW#cr.yandex/}"
          REGISTRY_ID="${REGISTRY_ID%%/*}"
          REGISTRY_ID="$(echo "$REGISTRY_ID" | tr -d '[:space:]')"
          if [[ -z "$REGISTRY_ID" ]]; then
            echo "::error::YC_REGISTRY_ID must be Container Registry id (e.g. crpXXXXXXXX), not empty."
            exit 1
          fi
          IMAGE_REF="cr.yandex/${REGISTRY_ID}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Pushing to ${IMAGE_REF}"

      - name: Stage shared assets for backend image
        run: cp -r decision-matrix/shared decision-matrix/backend/shared

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: decision-matrix/backend
          push: true
          tags: ${{ steps.image.outputs.image_ref }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image.outputs.image_ref }}
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Prune old registry images
        shell: bash
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
        run: |
          set -euo pipefail
          printf '%s' "$YC_SA_KEY_JSON" > "$RUNNER_TEMP/yc-sa-key.json"
          export YC_SERVICE_ACCOUNT_KEY_FILE="$RUNNER_TEMP/yc-sa-key.json"
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"
          bash deploy/prune-registry-images.sh "$YC_REGISTRY_ID" "${{ env.IMAGE_NAME }}" 5

      - name: Setup SSH deploy key
        shell: bash
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_KEY_B64: ${{ secrets.VM_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          if [[ -n "${VM_SSH_KEY_B64:-}" ]]; then
            echo "$VM_SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s' "$VM_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
            if [[ -n "$(tail -c1 ~/.ssh/deploy_key 2>/dev/null || true)" ]]; then
              echo >> ~/.ssh/deploy_key
            fi
          fi
          chmod 600 ~/.ssh/deploy_key
          first_line="$(head -n1 ~/.ssh/deploy_key | tr -d '\r')"
          if [[ "$first_line" == ssh-* ]]; then
            echo "::error::VM_SSH_KEY is a PUBLIC key (starts with ${first_line:0:40}...). Use the file WITHOUT .pub, or set secret VM_SSH_KEY_B64 (see DEPLOY.md)."
            exit 1
          fi
          if ! grep -q 'BEGIN .* PRIVATE KEY' ~/.ssh/deploy_key; then
            echo "::error::VM_SSH_KEY has no BEGIN ... PRIVATE KEY header. Paste the full private key file, or use VM_SSH_KEY_B64."
            exit 1
          fi
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::VM_SSH_KEY is invalid. Use VM_SSH_KEY_B64 from DEPLOY.md, or re-paste private key with LF line endings, no passphrase."
            exit 1
          fi
          echo "SSH_KEY_PATH=$HOME/.ssh/deploy_key" >> "$GITHUB_ENV"

      - name: Add VM host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -T 30 -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy assets
        id: upload
        shell: bash
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ${SSH_KEY_PATH} -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes"
          RELEASE_ID="$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          RELEASE_DIR="/opt/decision-matrix/releases/${RELEASE_ID}"
          ssh ${SSH_OPTS} "${VM_USER}@${VM_HOST}" "mkdir -p ${RELEASE_DIR}"
          scp ${SSH_OPTS} deploy/docker-compose.yml "${VM_USER}@${VM_HOST}:${RELEASE_DIR}/docker-compose.yml"
          scp ${SSH_OPTS} deploy/Caddyfile "${VM_USER}@${VM_HOST}:${RELEASE_DIR}/Caddyfile"
          scp ${SSH_OPTS} deploy/rollback.sh "${VM_USER}@${VM_HOST}:/opt/decision-matrix/rollback.sh"
          scp ${SSH_OPTS} deploy/prune-vm-docker-images.sh "${VM_USER}@${VM_HOST}:/opt/decision-matrix/prune-vm-docker-images.sh"
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Docker login on VM (Container Registry)
        shell: bash
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ${SSH_KEY_PATH} -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes"
          printf '%s' "$YC_SA_KEY_JSON" > "$RUNNER_TEMP/yc-sa-key.json"
          scp ${SSH_OPTS} "$RUNNER_TEMP/yc-sa-key.json" "${VM_USER}@${VM_HOST}:/tmp/yc-sa-key.json"
          ssh ${SSH_OPTS} "${VM_USER}@${VM_HOST}" \
            "cat /tmp/yc-sa-key.json | docker login --username json_key --password-stdin cr.yandex && rm -f /tmp/yc-sa-key.json"

      - name: Deploy release on VM
        shell: bash
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          RELEASE_DIR: ${{ steps.upload.outputs.release_dir }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ${SSH_KEY_PATH} -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes"
          ssh ${SSH_OPTS} "${VM_USER}@${VM_HOST}" bash -s <<REMOTE
          set -euo pipefail
          chmod +x /opt/decision-matrix/rollback.sh /opt/decision-matrix/prune-vm-docker-images.sh
          if [[ -f /opt/decision-matrix/shared/deploy.env ]]; then
            grep '^IMAGE_REF=' /opt/decision-matrix/shared/deploy.env | cut -d= -f2- \
              > /opt/decision-matrix/shared/previous_image_ref || true
          fi
          cat > /opt/decision-matrix/shared/deploy.env <<EOF
          IMAGE_REF=${IMAGE_REF}
          APP_DOMAIN=${APP_DOMAIN}
          EOF
          echo "${IMAGE_REF}" > '${RELEASE_DIR}/.image-ref'
          ln -sfn '${RELEASE_DIR}' /opt/decision-matrix/current
          cd /opt/decision-matrix/current
          set -a
          . /opt/decision-matrix/shared/deploy.env
          set +a
          df -h /
          docker image prune -f
          /opt/decision-matrix/prune-vm-docker-images.sh
          df -h /
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose exec -T api python seed.py || true
          REMOTE

      - name: Smoke health check
        id: healthcheck
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 10 \
            "https://${{ secrets.APP_DOMAIN }}/health" > /dev/null

      - name: Prune old Docker images on VM
        if: success()
        shell: bash
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ${SSH_KEY_PATH} -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes"
          ssh ${SSH_OPTS} "${VM_USER}@${VM_HOST}" /opt/decision-matrix/prune-vm-docker-images.sh

      - name: Rollback on healthcheck failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        shell: bash
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes \
            "${VM_USER}@${VM_HOST}" "/opt/decision-matrix/rollback.sh"
