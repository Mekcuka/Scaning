name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "decision-matrix/frontend/**"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: decision-matrix/frontend/package-lock.json

      - name: Install & build
        working-directory: decision-matrix/frontend
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_MAP_3D_ENABLED: ${{ vars.VITE_MAP_3D_ENABLED != '' && vars.VITE_MAP_3D_ENABLED || 'true' }}
          VITE_MAPTILER_KEY: ${{ vars.VITE_MAPTILER_KEY }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: decision-matrix/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
