services:
  well-trajectory-planner:
    build: .
    ports:
      - "${APP_PORT:-8082}:8082"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
